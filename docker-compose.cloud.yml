# Oracle Cloud용 Docker Compose 설정
# 작성일: 2025-11-30
# 작성자: hoyeon.han
#
# 사용법:
#   docker compose -f docker-compose.cloud.yml up -d

services:
  sollume-app:
    image: hoyeonhan/sollume-lab:latest
    container_name: sollume-finance-app
    ports:
      - "8501:8501"
    volumes:
      # 데이터 영속성을 위한 볼륨 마운트
      - ./logs:/app/logs
      - ./processed:/app/processed
      - ./uploads:/app/uploads
      # 2026-06-03 hoyeon.han: 발주내역 영속 저장소
      - ./order_data:/app/order_data
      # 거래처마스터 파일 (로컬에 준비 필요)
      - ./거래처마스터.xlsx:/app/Src/거래처마스터.xlsx:ro
    environment:
      - TZ=Asia/Seoul
      - PYTHONUNBUFFERED=1
      # 프로덕션 환경 설정
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=none
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 리소스 제한 (Oracle Cloud 스펙에 맞춤)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 20G
        reservations:
          cpus: '2'
          memory: 4G
    # 로깅 설정 (디스크 공간 관리)
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - sollume-network
    # 보안 설정
    security_opt:
      - no-new-privileges:true
    # 읽기 전용 루트 파일시스템 (데이터 디렉토리 제외)
    read_only: true
    tmpfs:
      - /tmp:size=1G

  # Nginx 리버스 프록시 (선택사항 - HTTPS용)
  # 주석 해제하여 사용
  # nginx:
  #   image: nginx:alpine
  #   container_name: sollume-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - sollume-app
  #   restart: unless-stopped
  #   networks:
  #     - sollume-network

networks:
  sollume-network:
    driver: bridge

