# nginx.conf
# 2026-06-11 hoyeon.han: 리버스 프록시 설정 (신규)
# 2026-06-11 hoyeon.han: 이 파일은 로컬/NAS 의 docker nginx 컨테이너(docker-compose.yml) 전용.
#                        Oracle Cloud 는 호스트에 설치된 nginx 를 사용한다 → nginx-host-api.conf.example 참고.
#
# 외부에는 nginx 포트(80, 추후 443)만 열고, 요청 경로에 따라 내부 컨테이너로 분기한다.
#   /api/ → sollume-api:8502  (발주내역 API, OpenClaw 등 외부 에이전트용)
#   /     → sollume-app:8501  (Streamlit 화면, WebSocket 필수)
# 내부 포트 8501/8502 는 docker 네트워크 안에서만 사용되고 외부에 직접 노출되지 않는다.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # WebSocket 업그레이드 처리 (Streamlit 화면 동작에 필수)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 발주내역 .xlsm 업로드 허용 크기
    client_max_body_size 300M;

    # JSON 응답 압축
    gzip on;
    gzip_types application/json;

    server {
        listen 80;
        server_name _;

        # ---------------- 발주내역 API (Flask, 인증은 Flask 가 X-API-Key 로 수행) ----------------
        location /api/ {
            proxy_pass http://sollume-api:8502;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;  # 큰 파일 다운로드/시트 파싱 대기
        }

        # ---------------- Streamlit 화면 ----------------
        location / {
            proxy_pass http://sollume-app:8501;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;  # WebSocket 장시간 연결 유지
        }
    }

    # ---------------- HTTPS (인증서 준비 후 주석 해제) ----------------
    # 1) 인증서 파일을 ./ssl/fullchain.pem, ./ssl/privkey.pem 으로 준비
    #    (docker-compose 의 nginx 서비스에서 ./ssl:/etc/nginx/ssl:ro 마운트도 함께 해제)
    # 2) 아래 server 블록의 주석을 해제하고 location 설정은 위 80 포트 블록과 동일하게 복사
    # 3) 80 포트 블록은 다음 한 줄로 교체해 HTTPS 로 강제 이동시킬 수 있다:
    #    return 301 https://$host$request_uri;
    #
    # server {
    #     listen 443 ssl;
    #     server_name _;
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #
    #     # (위 80 포트 server 블록의 location /api/, location / 설정을 그대로 복사)
    # }
}
