# Streamlit 설정 파일

[server]
# 서버 포트
port = 8501

# 모든 IP에서 접속 허용 (Docker용)
address = "0.0.0.0"

# 파일 변경 감지 (개발 모드)
runOnSave = true

# CORS 설정
enableCORS = false
enableXsrfProtection = true

# 최대 업로드 크기 (MB)
maxUploadSize = 200

[browser]
# 브라우저 자동 열기 (Docker에서는 비활성화)
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

# 2025-12-22 hoyeon.han: Quick Win #1 - 경리나라 스타일 테마 적용
# 참고: .claude/UI_DESIGN_IMPROVEMENT_PLAN.md
[theme]
# 메인 색상: 경리나라 블루 (신뢰감과 전문성)
primaryColor = "#0066FF"

# 배경 색상: 깨끗한 흰색
backgroundColor = "#FFFFFF"

# 보조 배경: 연한 회색 (카드 섹션, 입력창)
secondaryBackgroundColor = "#F5F7FA"

# 텍스트: 가독성 높은 차콜 그레이
textColor = "#2C3E50"

# 폰트: 한글 최적화 (Pretendard fallback)
# 시스템에 Pretendard가 없으면 Apple SD Gothic Neo, Malgun Gothic 사용
font = "sans serif"

[logger]
# 로깅 레벨
level = "info"

[client]
# 클라이언트 설정
showErrorDetails = true
toolbarMode = "auto"
