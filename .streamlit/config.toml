# Streamlit 설정 파일

[server]
# 서버 포트
port = 8501

# 모든 IP에서 접속 허용 (Docker용)
address = "0.0.0.0"

# 파일 변경 감지 (개발 모드)
runOnSave = true

# CORS 설정
enableCORS = false
enableXsrfProtection = true

# 최대 업로드 크기 (MB)
maxUploadSize = 200

[browser]
# 브라우저 자동 열기 (Docker에서는 비활성화)
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

# 2025-12-22 hoyeon.han: Quick Win #1 - 경리나라 스타일 테마 적용
# 2026-07-09 hoyeon.han: 디자인 개선 - Stripe 계열 밝은 핀테크 팔레트
# 2026-07-10 hoyeon.han: 라이트/다크 커스텀 테마 분리 ([theme.light]/[theme.dark]).
#   사용자는 우측 상단 ☰ 설정 메뉴에서 라이트/다크 전환(표 포함 네이티브 일관 전환).
#   컴포넌트 세부 스타일/폰트(Pretendard)는 Src/ui_theme.py inject_global_css() 가 테마 적응형으로 담당.
#   포인트색을 경리나라 블루(#0066FF)로 되돌리려면 [theme.light] primaryColor 교체.
# --- 기존 단일 [theme] 블록 (주석 보존) ---
# [theme]
# primaryColor = "#533afd"                # (이전 #0066FF)
# backgroundColor = "#FFFFFF"
# secondaryBackgroundColor = "#F6F9FC"    # (이전 #F5F7FA)
# textColor = "#0D253D"                   # (이전 #2C3E50)
# font = "sans serif"
# --- 기존 끝 ---
[theme]
base = "light"
font = "sans serif"
baseRadius = "medium"

# 라이트(기본) — Stripe 계열 밝은 핀테크
[theme.light]
primaryColor = "#533AFD"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F6F9FC"
textColor = "#0D253D"
borderColor = "#E3E8EE"

# 다크 — 우아한 블랙 브랜드 톤
[theme.dark]
primaryColor = "#8B83FF"
backgroundColor = "#14161B"
secondaryBackgroundColor = "#1B1E25"
textColor = "#ECEEF2"
borderColor = "#2A2E37"

[logger]
# 로깅 레벨
level = "info"

[client]
# 클라이언트 설정
showErrorDetails = true
toolbarMode = "auto"
