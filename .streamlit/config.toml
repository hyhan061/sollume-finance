# Streamlit 설정 파일

[server]
# 서버 포트
port = 8501

# 모든 IP에서 접속 허용 (Docker용)
address = "0.0.0.0"

# 파일 변경 감지 (개발 모드)
runOnSave = true

# CORS 설정
enableCORS = false
enableXsrfProtection = true

# 최대 업로드 크기 (MB)
maxUploadSize = 200

[browser]
# 브라우저 자동 열기 (Docker에서는 비활성화)
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

# 2025-12-22 hoyeon.han: Quick Win #1 - 경리나라 스타일 테마 적용
# 참고: .claude/UI_DESIGN_IMPROVEMENT_PLAN.md
# 2026-07-09 hoyeon.han: 디자인 개선 - Stripe 계열 밝은 핀테크 팔레트로 변경
#   (딥네이비 텍스트 + 인디고 포인트). 상세 스타일/폰트는 Src/ui_theme.py (CSS 주입).
#   포인트색을 기존 경리나라 블루(#0066FF)로 되돌리려면 아래 primaryColor만 교체하면 됨.
[theme]
# 메인 색상: Stripe 인디고 (포인트/버튼/포커스)
# 2026-07-09 hoyeon.han: 기존 #0066FF → #533afd
# primaryColor = "#0066FF"
primaryColor = "#533afd"

# 배경 색상: 깨끗한 흰색
backgroundColor = "#FFFFFF"

# 보조 배경: 연한 회색 (카드 섹션, 입력창)
# 2026-07-09 hoyeon.han: 기존 #F5F7FA → #F6F9FC (Stripe canvas-soft)
# secondaryBackgroundColor = "#F5F7FA"
secondaryBackgroundColor = "#F6F9FC"

# 텍스트: 딥네이비 (가독성 + 절제된 전문성)
# 2026-07-09 hoyeon.han: 기존 #2C3E50 → #0D253D
# textColor = "#2C3E50"
textColor = "#0D253D"

# 폰트: 한글 최적화 (실제 Pretendard 웹폰트 로딩은 Src/ui_theme.py 의 CSS @import 담당)
font = "sans serif"

[logger]
# 로깅 레벨
level = "info"

[client]
# 클라이언트 설정
showErrorDetails = true
toolbarMode = "auto"
